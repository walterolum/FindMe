<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FindMe - Cavendish University Uganda Lost & Found</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
:root{--primary:#6366f1;--primary-dark:#4f46e5;--primary-light:#a5b4fc;--accent:#8b5cf6;--accent2:#ec4899;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--info:#06b6d4;--dark:#0f172a;--dark2:#1e293b;--dark3:#334155;--glass:rgba(255,255,255,0.08);--glass2:rgba(255,255,255,0.12);--glass-border:rgba(255,255,255,0.15);--text:#f8fafc;--text-muted:#94a3b8;--card-bg:rgba(30,41,59,0.85);--sidebar-bg:rgba(15,23,42,0.95)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 20% 50%,rgba(99,102,241,0.15) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(139,92,246,0.1) 0%,transparent 50%),radial-gradient(circle at 50% 80%,rgba(236,72,153,0.08) 0%,transparent 50%);z-index:-1;animation:bgFloat 20s ease-in-out infinite}
@keyframes bgFloat{0%,100%{transform:translate(0,0)}50%{transform:translate(-2%,2%)}}

.glass2{background:var(--glass2);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid var(--glass-border);border-radius:16px}
.gradient-text{background:linear-gradient(135deg,var(--primary-light),var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.btn-glass{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--glass-border);color:var(--text);padding:10px 24px;border-radius:12px;cursor:pointer;font-weight:600;font-size:0.9rem;transition:all .3s ease;display:inline-flex;align-items:center;gap:8px;text-decoration:none}
.btn-glass:hover{background:var(--primary);border-color:var(--primary);transform:translateY(-2px);box-shadow:0 8px 25px rgba(99,102,241,0.4);color:white}
.btn-glass.btn-primary{background:linear-gradient(135deg,var(--primary),var(--accent));border:none;color:white}
.btn-glass.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(99,102,241,0.5)}
.btn-glass.btn-success{background:linear-gradient(135deg,var(--success),#059669);border:none;color:white}
.btn-glass.btn-danger{background:linear-gradient(135deg,var(--danger),#dc2626);border:none;color:white}
.btn-glass.btn-warning{background:linear-gradient(135deg,var(--warning),#d97706);border:none;color:white}
.btn-glass.btn-info{background:linear-gradient(135deg,var(--info),#0891b2);border:none;color:white}
.btn-glass.btn-sm{padding:6px 14px;font-size:0.8rem;border-radius:8px}

.input-glass:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,0.2);background:rgba(255,255,255,0.08)}
.input-glass::placeholder{color:var(--text-muted)}

select.input-glass option{background:#1e293b;color:#f8fafc;padding:10px}
select.input-glass option[value=""]{color:#94a3b8}
textarea.input-glass{resize:vertical;min-height:80px}
label{display:block;font-weight:500;margin-bottom:6px;font-size:0.85rem;color:var(--text-muted);letter-spacing:0.3px}
.form-group{margin-bottom:20px}

.table-glass{width:100%;border-collapse:separate;border-spacing:0}
.table-glass thead th{background:rgba(99,102,241,0.15);padding:14px 16px;font-size:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--primary-light);border-bottom:1px solid var(--glass-border)}

.badge-3d{padding:5px 12px;border-radius:8px;font-size:0.75rem;font-weight:600;letter-spacing:0.3px}

.badge-resolved,.badge-returned,.badge-approved{background:rgba(16,185,129,0.15);color:var(--success);border:1px solid rgba(16,185,129,0.3)}
.badge-rejected{background:rgba(239,68,68,0.15);color:var(--danger);border:1px solid rgba(239,68,68,0.3)}

.badge-user{background:rgba(99,102,241,0.15);color:var(--primary-light);border:1px solid rgba(99,102,241,0.3)}

.badge-found{background:rgba(16,185,129,0.15);color:var(--success);border:1px solid rgba(16,185,129,0.3)}
.img-thumb{width:48px;height:48px;border-radius:10px;object-fit:cover;border:2px solid var(--glass-border)}
.hero-3d{background:linear-gradient(135deg,rgba(99,102,241,0.2),rgba(139,92,246,0.15),rgba(236,72,153,0.1));backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:24px;padding:60px 40px;text-align:center;margin-bottom:32px;position:relative;overflow:hidden}
.hero-3d::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(99,102,241,0.2),transparent 70%);border-radius:50%;animation:heroFloat 8s ease-in-out infinite}
.hero-3d::after{content:'';position:absolute;bottom:-100px;left:-100px;width:300px;height:300px;background:radial-gradient(circle,rgba(236,72,153,0.15),transparent 70%);border-radius:50%;animation:heroFloat 8s ease-in-out infinite reverse}
@keyframes heroFloat{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-20px)}}
.hero-3d h1{font-size:3rem;font-weight:900;margin-bottom:12px;position:relative;z-index:1}
.hero-3d p{font-size:1.15rem;color:var(--text-muted);position:relative;z-index:1;max-width:600px;margin:0 auto}
.feature-card{background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:20px;padding:32px 24px;text-align:center;transition:all .4s cubic-bezier(.175,.885,.32,1.275);cursor:default}
.feature-card:hover{transform:translateY(-8px) rotateX(2deg);box-shadow:0 25px 60px rgba(0,0,0,0.3)}
.feature-card .icon-wrap{width:72px;height:72px;border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:1.8rem;transition:all .3s ease}

.feature-card p{color:var(--text-muted);font-size:0.9rem;margin:0}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);z-index:9999;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-glass{background:var(--dark2);border:1px solid var(--glass-border);border-radius:20px;padding:32px;max-width:500px;width:90%;max-height:90vh;overflow-y:auto}
.toast-float{position:fixed;top:80px;right:24px;z-index:9999;min-width:320px;padding:16px 20px;border-radius:14px;backdrop-filter:blur(20px);border:1px solid var(--glass-border);animation:slideInRight .4s cubic-bezier(.175,.885,.32,1.275);display:flex;align-items:center;gap:12px;font-weight:500;font-size:0.9rem}
.toast-float.success{background:rgba(16,185,129,0.15);border-color:rgba(16,185,129,0.3);color:var(--success)}
.toast-float.danger{background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.3);color:var(--danger)}
.toast-float.warning{background:rgba(245,158,11,0.15);border-color:rgba(245,158,11,0.3);color:var(--warning)}
@keyframes slideInRight{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-state i{font-size:4rem;margin-bottom:16px;display:block}
.footer-glass{margin-top:60px;padding:32px 0;text-align:center;color:var(--text-muted);font-size:0.85rem;border-top:1px solid var(--glass-border)}
.page-title{font-size:1.6rem;font-weight:800;margin-bottom:24px;display:flex;align-items:center;gap:12px}
.page-title i{font-size:1.4rem}
.container{max-width:1400px;margin:0 auto;padding:20px 24px}
.row{display:grid;gap:20px}
.row-2{grid-template-columns:1fr 1fr}
.row-3{grid-template-columns:1fr 1fr 1fr}
.row-4{grid-template-columns:1fr 1fr 1fr 1fr}
.row-5{grid-template-columns:1fr 1fr 1fr 1fr 1fr}
@media(max-width:1024px){.row-4,.row-5{grid-template-columns:1fr 1fr}}
@media(max-width:768px){.row-2,.row-3,.row-4,.row-5{grid-template-columns:1fr}.hero-3d h1{font-size:2rem}.hero-3d{padding:40px 20px}.nav-links{display:none!important}}
.auth-container{max-width:480px;margin:60px auto}
.auth-card{background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:24px;padding:40px}
.auth-card h2{font-size:1.8rem;font-weight:800;margin-bottom:8px}
.auth-card .subtitle{color:var(--text-muted);margin-bottom:32px;font-size:0.95rem}
.auth-card .auth-footer{text-align:center;margin-top:24px;color:var(--text-muted);font-size:0.9rem}
.auth-card .auth-footer a{color:var(--primary-light);text-decoration:none;font-weight:600}
.error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--danger);padding:12px 16px;border-radius:12px;margin-bottom:16px;font-size:0.9rem;display:none;align-items:center;gap:8px}
.error-msg.show{display:flex}
.divider{height:1px;background:var(--glass-border);margin:16px 0}
.d-flex{display:flex}.gap-2{gap:8px}.gap-3{gap:12px}.justify-between{justify-content:space-between}.align-center{align-items:center}.flex-wrap{flex-wrap:wrap}.flex-1{flex:1}.flex-col{flex-direction:column}
.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:20px}.mb-5{margin-bottom:32px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:20px}
.text-center{text-align:center}.text-muted{color:var(--text-muted)}.text-sm{font-size:0.85rem}.text-xs{font-size:0.75rem}.fw-bold{font-weight:700}
.w-100{width:100%}
.scroll-y{overflow-y:auto;max-height:500px}
@media print{.no-print{display:none!important}.navbar-glass{display:none!important}body{background:white;color:#333}}
.animate-in{animation:fadeUp .5s ease forwards;opacity:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.badge-student{background:rgba(99,102,241,0.15);color:var(--primary-light);border:1px solid rgba(99,102,241,0.3)}
.badge-staff{background:rgba(6,182,212,0.15);color:var(--info);border:1px solid rgba(6,182,212,0.3)}
.badge-security{background:rgba(245,158,11,0.15);color:var(--warning);border:1px solid rgba(245,158,11,0.3)}
.badge-moderator{background:rgba(139,92,246,0.15);color:var(--accent);border:1px solid rgba(139,92,246,0.3)}
.badge-super{background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(239,68,68,0.15));color:var(--warning);border:1px solid rgba(245,158,11,0.4)}
.badge-active{background:rgba(16,185,129,0.15);color:var(--success);border:1px solid rgba(16,185,129,0.3)}
.badge-banned{background:rgba(239,68,68,0.15);color:var(--danger);border:1px solid rgba(239,68,68,0.3)}
.badge-resolved{background:rgba(16,185,129,0.15);color:var(--success);border:1px solid rgba(16,185,129,0.3)}
.badge-matched{background:rgba(124,58,237,0.15);color:#a78bfa;border:1px solid rgba(124,58,237,0.3)}
.badge-urgent{background:rgba(239,68,68,0.2);color:var(--danger);border:1px solid rgba(239,68,68,0.4);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}
.tab-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:20px;padding:4px;background:var(--glass);border-radius:14px;border:1px solid var(--glass-border)}
.tab-bar .tab{padding:8px 16px;border-radius:10px;cursor:pointer;font-size:0.85rem;font-weight:500;color:var(--text-muted);transition:all .3s ease;display:flex;align-items:center;gap:6px}
.tab-bar .tab:hover{color:var(--text);background:rgba(255,255,255,0.05)}

.progress-bar .fill{height:100%;border-radius:4px;transition:width .6s ease}

<body>

<nav class="navbar-glass" id="navbar"></nav>
<div class="container" id="main-content">
  <div style="text-align:center;padding:100px 20px">
    <div style="width:48px;height:48px;border:4px solid var(--glass-border);border-top-color:var(--primary);border-radius:50%;margin:0 auto 20px;animation:spin 1s linear infinite"></div>
    <p class="text-muted">Loading FindMe...</p>
    <p class="text-xs text-muted mt-2">If this persists, make sure you are using <code>http://localhost</code> (not file://)</p>
  </div>
</div>
<noscript><div style="text-align:center;padding:60px;color:white;background:#0f172a"><h2>JavaScript Required</h2><p>Please enable JavaScript to use FindMe.</p></div></noscript>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
<script>
const DB={
  db:null,
  async init(){
    const SQL=await initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${f}`});
    const s=localStorage.getItem('findme_db_v1');
    if(s){
      try{
        this.db=new SQL.Database(new Uint8Array(JSON.parse(s)));
        this.createTables();
        this.migrate();
        const admin=this.q1("SELECT user_id FROM users WHERE email=?",'admin@cavendish.ac.ug');
        if(!admin)this.seed();
      }catch(e){
        console.warn('DB load failed, creating fresh:',e);
        localStorage.removeItem('findme_db_v1');
        this.db=new SQL.Database();this.createTables();this.seed();
      }
    }
    else{this.db=new SQL.Database();this.createTables();this.seed()}
  },
  save(){localStorage.setItem('findme_db_v1',JSON.stringify(Array.from(this.db.export())))},
  migrate(){
    const cols=(t)=>{const r=this.q(`PRAGMA table_info(${t})`);return r.map(c=>c.name)};
    const add=(t,c,d)=>{try{this.db.run(`ALTER TABLE ${t} ADD COLUMN ${c} ${d}`)}catch(e){}};
    const uc=cols('users');
    if(!uc.includes('status'))add('users','status',"TEXT DEFAULT 'active'");
    if(!uc.includes('campus'))add('users','campus',"TEXT DEFAULT 'Main Campus'");
    if(!uc.includes('avatar'))add('users','avatar','TEXT');
    if(!uc.includes('bio'))add('users','bio','TEXT');
    if(!uc.includes('points'))add('users','points','INTEGER DEFAULT 0');
    if(!uc.includes('badges'))add('users','badges',"TEXT DEFAULT ''");
    if(!uc.includes('last_login'))add('users','last_login','TEXT');
    if(!uc.includes('created_at'))add('users','created_at','DATETIME DEFAULT CURRENT_TIMESTAMP');
    const lc=cols('lost_items');
    if(!lc.includes('campus'))add('lost_items','campus','TEXT');
    if(!lc.includes('views'))add('lost_items','views','INTEGER DEFAULT 0');

  hashP(p){let h=0;for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h=h&h}return'h_'+Math.abs(h).toString(36)},
  verifyP(p,s){return this.hashP(p)===s},
  q(sql,p=[]){const st=this.db.prepare(sql);if(p.length)st.bind(p);const r=[];while(st.step())r.push(st.getAsObject());st.free();return r},

};

const Auth={
  user:null,
  init(){const s=sessionStorage.getItem('lfuser');if(s)this.user=JSON.parse(s)},
  login(em,pw){
    const u=DB.q1("SELECT * FROM users WHERE email=?",[em]);
    if(!u||!DB.verifyP(pw,u.password))return{ok:false,msg:'Invalid email or password.'};
    if(u.status==='banned')return{ok:false,msg:'Your account has been banned. Contact administrator.'};
    this.user={user_id:u.user_id,fullname:u.fullname,email:u.email,role:u.role,status:u.status,student_id:u.student_id,faculty:u.faculty,course:u.course,campus:u.campus,points:u.points||0,badges:u.badges||''};
    sessionStorage.setItem('lfuser',JSON.stringify(this.user));
    DB.run("UPDATE users SET last_login=datetime('now') WHERE user_id=?",[u.user_id]);
    DB.log(u.user_id,'login','user',u.user_id,'User logged in');
    return{ok:true};
  },
  register(d){
    if(DB.q1("SELECT user_id FROM users WHERE email=?",[d.email]))return{ok:false,msg:'Email already registered.'};
    DB.run("INSERT INTO users(fullname,email,phone,password,role,student_id,faculty,course,year_of_study,semester,campus) VALUES(?,?,?,?,?,?,?,?,?,?,?)",[d.fullname,d.email,d.phone||'',DB.hashP(d.password),'student',d.student_id,d.faculty,d.course,d.year_of_study,d.semester,d.campus||'Main Campus']);
    const uid=DB.lastId();
    DB.log(uid,'register','user',uid,'New user registered: '+d.fullname);
    return{ok:true};
  },
  logout(){if(this.user)DB.log(this.user.user_id,'logout','user',this.user.user_id,'User logged out');this.user=null;sessionStorage.removeItem('lfuser')},
  logged(){return this.user!==null},
  admin(){return this.user&&(this.user.role==='admin'||this.user.role==='super')},
  staff(){return this.user&&(this.user.role==='staff'||this.user.role==='admin'||this.user.role==='super')},
  security(){return this.user&&(this.user.role==='security'||this.user.role==='admin'||this.user.role==='super')},
  moderator(){return this.user&&(this.user.role==='moderator'||this.user.role==='admin'||this.user.role==='super')},
  hasRole(r){return this.user&&this.user.role===r},
  can(action){
    if(!this.user)return false;
    const perms={
      'manage_users':['admin','super'],
      'manage_categories':['admin','super'],
      'manage_items':['admin','super','moderator'],
      'manage_claims':['admin','super','moderator'],
      'verify_items':['admin','super','security'],
      'manage_found':['admin','super','staff'],
      'manage_announcements':['admin','super','moderator'],
      'view_audit':['admin','super'],
      'manage_settings':['super'],
      'export_data':['admin','super'],
      'view_analytics':['admin','super','moderator'],
      'send_mass_msg':['admin','super'],
      'ban_users':['admin','super']
    };
    return perms[action]?perms[action].includes(this.user.role):false;
  },
  roleBadge(r){const m={student:'badge-student',staff:'badge-staff',security:'badge-security',moderator:'badge-moderator',admin:'badge-admin',super:'badge-super'};return`<span class="badge-3d ${m[r]||'badge-user'}">${r}</span>`},
  statusBadge(s){return`<span class="badge-3d badge-${s}">${s}</span>`},
  notifCount(){if(!this.logged())return 0;const r=DB.q1("SELECT COUNT(*) as c FROM notifications WHERE user_id=? AND status='unread'",[this.user.user_id]);return r?r.c:0},
  msgCount(){if(!this.logged())return 0;const r=DB.q1("SELECT COUNT(*) as c FROM messages WHERE receiver_id=? AND is_read=0",[this.user.user_id]);return r?r.c:0},
  addPoints(pts){if(!this.logged())return;DB.run("UPDATE users SET points=points+? WHERE user_id=?",[pts,this.user.user_id]);this.user.points=(this.user.points||0)+pts;sessionStorage.setItem('lfuser',JSON.stringify(this.user))},
  addBadge(badge){if(!this.logged())return;const cur=this.user.badges?this.user.badges.split(','):[];
    if(!cur.includes(badge)){cur.push(badge);this.user.badges=cur.join(',');DB.run("UPDATE users SET badges=? WHERE user_id=?",[this.user.badges,this.user.user_id]);sessionStorage.setItem('lfuser',JSON.stringify(this.user))}}
};

  pgLogin(){
    if(Auth.logged()){const r=Auth.user.role;if(r==='admin'||r==='super')this.go('admin_dashboard');else if(r==='staff')this.go('staff_dashboard');else if(r==='security')this.go('security_dashboard');else this.go('dashboard');return}
    document.getElementById('main-content').innerHTML=`<div class="auth-container animate-in"><div class="auth-card"><h2 class="gradient-text">Welcome Back</h2><p class="subtitle">Sign in to your FindMe account</p><div id="login-err" class="error-msg"><i class="bi bi-exclamation-circle"></i><span></span></div><form id="loginForm"><div class="form-group"><label>Email Address</label><input type="email" class="input-glass" id="loginEmail" placeholder="you@university.edu" required></div><div class="form-group"><label>Password</label><input type="password" class="input-glass" id="loginPassword" placeholder="Enter your password" required></div><button type="submit" class="btn-glass btn-primary w-100 btn-lg"><i class="bi bi-box-arrow-in-right"></i> Sign In</button></form><p class="auth-footer">Don't have an account? <a href="#register">Create one now</a></p></div></div>`;
    document.getElementById('loginForm').onsubmit=e=>{e.preventDefault();const r=Auth.login(document.getElementById('loginEmail').value,document.getElementById('loginPassword').value);if(r.ok){const role=Auth.user.role;if(role==='admin'||role==='super')this.go('admin_dashboard');else if(role==='staff')this.go('staff_dashboard');else if(role==='security')this.go('security_dashboard');else this.go('dashboard')}else{const er=document.getElementById('login-err');er.querySelector('span').textContent=r.msg;er.classList.add('show')}};
  },

  pgRegister(){
    if(Auth.logged()){const r=Auth.user.role;if(r==='admin'||r==='super')this.go('admin_dashboard');else if(r==='staff')this.go('staff_dashboard');else if(r==='security')this.go('security_dashboard');else this.go('dashboard');return}
    const facOpts=FACULTIES.map(f=>`<option value="${f}">${f}</option>`).join('');
    document.getElementById('main-content').innerHTML=`<div class="auth-container animate-in"><div class="auth-card" style="max-width:560px;margin:0 auto"><h2 class="gradient-text">Join FindMe</h2><p class="subtitle">Create your student account</p><div id="reg-err" class="error-msg"><i class="bi bi-exclamation-circle"></i><span></span></div><form id="regForm">
      <div class="form-group"><label>Full Name *</label><input type="text" class="input-glass" id="rName" placeholder="Enter your full name" required></div>
      <div class="form-group"><label>Student/Staff ID *</label><input type="text" class="input-glass" id="rSid" placeholder="e.g. 123-456" pattern="[0-9]{3}-[0-9]{3}" required title="Format: 123-456"></div>
      <div class="form-group"><label>Email Address *</label><input type="email" class="input-glass" id="rEmail" placeholder="you@cavendish.ac.ug" required></div>
      <div class="form-group"><label>Phone Number</label><input type="text" class="input-glass" id="rPhone" placeholder="e.g. 0700123456"></div>
      <div class="form-group"><label>Campus *</label><select class="input-glass" id="rCampus" required><option value="">Select Campus</option>${CAMPUS_LIST.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div>
      <div class="form-group"><label>Faculty *</label><select class="input-glass" id="rFaculty" required><option value="">Select Faculty</option>${facOpts}</select></div>
      <div class="form-group"><label>Course / Program *</label><select class="input-glass" id="rCourse" required><option value="">Select Faculty first</option></select></div>
      <div class="row row-2"><div class="form-group"><label>Year of Study *</label><select class="input-glass" id="rYear" required><option value="">Select Year</option>${YEARS.map(y=>`<option value="${y}">Year ${y}</option>`).join('')}</select></div><div class="form-group"><label>Semester *</label><select class="input-glass" id="rSem" required><option value="">Select Semester</option><option value="1">Semester 1</option><option value="2">Semester 2</option></select></div></div>
      <div class="form-group"><label>Password *</label><input type="password" class="input-glass" id="rPwd" placeholder="Min 6 characters" required minlength="6"></div>
      <div class="form-group"><label>Confirm Password *</label><input type="password" class="input-glass" id="rCfPwd" placeholder="Re-enter password" required></div>
      <button type="submit" class="btn-glass btn-primary w-100 btn-lg"><i class="bi bi-person-plus"></i> Create Account</button>
    </form><p class="auth-footer">Already have an account? <a href="#login">Sign in</a></p></div></div>`;
    document.getElementById('rFaculty').onchange=function(){const c=COURSES[this.value]||[];const sel=document.getElementById('rCourse');sel.innerHTML='<option value="">Select Course</option>'+c.map(x=>`<option value="${x}">${x}</option>`).join('')};
    document.getElementById('regForm').onsubmit=e=>{e.preventDefault();
      const d={fullname:document.getElementById('rName').value.trim(),email:document.getElementById('rEmail').value.trim(),phone:document.getElementById('rPhone').value.trim(),student_id:document.getElementById('rSid').value.trim(),campus:document.getElementById('rCampus').value,faculty:document.getElementById('rFaculty').value,course:document.getElementById('rCourse').value,year_of_study:document.getElementById('rYear').value,semester:document.getElementById('rSem').value,password:document.getElementById('rPwd').value,cf:document.getElementById('rCfPwd').value};
      const er=document.getElementById('reg-err');
      if(!d.fullname||!d.email||!d.password||!d.student_id||!d.campus||!d.faculty||!d.course||!d.year_of_study||!d.semester){er.querySelector('span').textContent='All required fields must be filled.';er.classList.add('show');return}
      if(!/^\d{3}-\d{3}$/.test(d.student_id)){er.querySelector('span').textContent='Student ID must be in format 123-456.';er.classList.add('show');return}
      if(d.password.length<6){er.querySelector('span').textContent='Password must be at least 6 characters.';er.classList.add('show');return}
      if(d.password!==d.cf){er.querySelector('span').textContent='Passwords do not match.';er.classList.add('show');return}
      const r=Auth.register(d);if(r.ok){this.toast('Account created! Please sign in.');this.go('login')}else{er.querySelector('span').textContent=r.msg;er.classList.add('show')}};
  },

  generateQR(text){
    const size=120;const mc=21;const cs=Math.floor(size/mc);
    let svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}"><rect width="${size}" height="${size}" fill="white"/>`;
    let hash=0;for(let i=0;i<text.length;i++){hash=((hash<<5)-hash)+text.charCodeAt(i);hash=hash&hash}
    const rng=()=>{hash=(hash*16807)%2147483647;return hash/2147483647};
    for(let r=0;r<mc;r++){for(let c=0;c<mc;c++){
      const corner=(r<7&&c<7)||(r<7&&c>=mc-7)||(r>=mc-7&&c<7);
      const inCorner=(r>=1&&r<=5&&c>=1&&c<=5)||(r>=1&&r<=5&&c>=mc-6&&c<=mc-2)||(r>=mc-6&&r<=mc-2&&c>=1&&c<=5);
      const isF=corner&&!inCorner||rng()>0.55;
      if(isF)svg+=`<rect x="${c*cs}" y="${r*cs}" width="${cs}" height="${cs}" fill="#000"/>`;
    }}
    svg+='</svg>';return svg;
  },

      let tr='';DB.q("SELECT cl.*, fi.item_name, u.fullname FROM claims cl JOIN found_items fi ON cl.found_id=fi.found_id JOIN users u ON cl.claimant_id=u.user_id WHERE cl.status='approved' ORDER BY cl.created_at DESC").forEach((c,i)=>{tr+=`<tr><td>${i+1}</td><td>${this.h(c.item_name)}</td><td>${this.h(c.fullname)}</td><td>${c.claim_date||''}</td></tr>`});
      content=`<div style="overflow-x:auto"><table class="table-glass"><thead><tr><th>#</th><th>Item</th><th>Claimant</th><th>Date</th></tr></thead><tbody>${tr||'<tr><td colspan="4" class="text-center text-muted">No data</td></tr>'}</tbody></table></div>`;

    let tb=tabs.map(t=>`<a href="#admin_reports?tab=${t.k}" class="btn-glass btn-sm ${tab===t.k?'btn-primary':''}"><i class="bi ${t.i}"></i> ${t.l}</a>`).join('');

  },

  pgSavedItems(){
    const uid=Auth.user.user_id;const saved=DB.q("SELECT s.*, CASE WHEN s.item_type='lost' THEN li.item_name ELSE fi.item_name END as item_name, CASE WHEN s.item_type='lost' THEN li.description ELSE fi.description END as description, CASE WHEN s.item_type='lost' THEN li.image ELSE fi.image END as image, CASE WHEN s.item_type='lost' THEN li.location ELSE fi.location END as location, CASE WHEN s.item_type='lost' THEN li.status ELSE fi.status END as status, c.category_name FROM saved_items s LEFT JOIN lost_items li ON s.item_type='lost' AND s.item_id=li.lost_id LEFT JOIN found_items fi ON s.item_type='found' AND s.item_id=fi.found_id LEFT JOIN categories c ON COALESCE(li.category_id,fi.category_id)=c.category_id WHERE s.user_id=? ORDER BY s.created_at DESC",[uid]);
    let cards='';saved.forEach((s,i)=>{if(!s.item_name)return;cards+=`<div class="card-3d animate-in" style="${this.animDelay(i)}"><img src="${this.imgS(s.image)||'https://placehold.co/400x200/1e293b/94a3b8?text=No+Image'}" style="width:100%;height:160px;object-fit:cover;border-radius:12px;margin-bottom:12px"><div class="d-flex gap-2 mb-2"><span class="badge-3d ${s.item_type==='lost'?'badge-lost':'badge-found'}">${s.item_type==='lost'?'Lost':'Found'}</span><span class="badge-3d badge-pending">${this.h(s.category_name||'')}</span></div><h4 class="fw-bold mb-1">${this.h(s.item_name)}</h4><p class="text-xs text-muted mb-2"><i class="bi bi-geo-alt"></i> ${this.h(s.location||'')}</p><div class="d-flex justify-between align-center"><a href="#item_detail?type=${s.item_type}&id=${s.item_id}" class="btn-glass btn-sm btn-primary"><i class="bi bi-eye"></i> View</a><button class="btn-glass btn-sm btn-danger" onclick="App.unsave(${s.save_id})"><i class="bi bi-bookmark-fill"></i> Unsave</button></div></div>`});
    document.getElementById('main-content').innerHTML=`
      <h2 class="page-title animate-in"><i class="bi bi-bookmark gradient-text"></i> <span class="gradient-text">Saved Items</span></h2>
      ${cards?`<div class="row row-3">${cards}</div>`:'<div class="empty-state animate-in"><i class="bi bi-bookmark"></i><h4>No saved items</h4><p>Browse items and save them for later</p><a href="#search" class="btn-glass btn-primary mt-3"><i class="bi bi-search"></i> Search Items</a></div>'}${this.footer()}`;
  },
  unsave(id){DB.run("DELETE FROM saved_items WHERE save_id=? AND user_id=?",[id,Auth.user.user_id]);this.toast('Item removed from saved.');this.pgSavedItems()},

  pgMessages(){

      ${items||'<div class="empty-state animate-in"><i class="bi bi-envelope"></i><h4>No messages yet</h4><p>Start a conversation from item detail pages</p></div>'}${this.footer()}`;

  pgMsgDetail(){
    const rid=parseInt(new URLSearchParams(location.hash.split('?')[1]).get('id'));
    if(!rid){this.go('messages');return}
    const uid=Auth.user.user_id;const other=DB.q1("SELECT fullname FROM users WHERE user_id=?",[rid]);
    const msgs=DB.q("SELECT m.*, u.fullname FROM messages m JOIN users u ON m.sender_id=u.user_id WHERE (m.sender_id=? AND m.receiver_id=?) OR (m.sender_id=? AND m.receiver_id=?) ORDER BY m.created_at ASC",[uid,rid,rid,uid]);
    DB.run("UPDATE messages SET is_read=1 WHERE sender_id=? AND receiver_id=? AND is_read=0",[rid,uid]);
    let bubbles='';msgs.forEach(m=>{const isSent=m.sender_id===uid;bubbles+=`<div class="chat-bubble ${isSent?'chat-sent':'chat-received'} animate-in">${this.h(m.message)}<div class="text-xs ${isSent?'':'text-muted'}" style="margin-top:4px;opacity:0.7">${m.created_at}</div></div>`});
    document.getElementById('main-content').innerHTML=`
      <div class="d-flex align-center mb-4"><button class="btn-glass" onclick="history.back()"><i class="bi bi-arrow-left"></i></button><h2 class="page-title animate-in" style="margin:0 0 0 12px"><i class="bi bi-chat-dots gradient-text"></i> <span class="gradient-text">${this.h(other?other.fullname:'User')}</span></h2></div>
      <div class="card-3d animate-in" style="max-width:800px"><div id="msgList" style="min-height:300px;max-height:500px;overflow-y:auto;padding:16px">${bubbles||'<div class="empty-state"><p>Start the conversation</p></div>'}</div>
      <div class="divider"></div><form id="msgForm" class="d-flex gap-2"><input type="text" class="input-glass flex-1" id="msgInput" placeholder="Type a message..." required><button type="submit" class="btn-glass btn-primary"><i class="bi bi-send"></i></button></form></div>${this.footer()}`;
    const list=document.getElementById('msgList');list.scrollTop=list.scrollHeight;
    document.getElementById('msgForm').onsubmit=e=>{e.preventDefault();const txt=document.getElementById('msgInput').value.trim();if(!txt)return;DB.sendMsg(uid,rid,txt);document.getElementById('msgInput').value='';DB.notify(rid,`New message from ${Auth.user.fullname}`,'message','#message_detail?id='+uid);this.pgMsgDetail()};
  },

  pgAdminMatching(){
    const losts=DB.q("SELECT l.*, c.category_name, u.fullname FROM lost_items l JOIN categories c ON l.category_id=c.category_id JOIN users u ON l.user_id=u.user_id WHERE l.status='pending' ORDER BY l.created_at DESC");
    const founds=DB.q("SELECT f.*, c.category_name, u.fullname FROM found_items f JOIN categories c ON f.category_id=c.category_id JOIN users u ON f.user_id=u.user_id WHERE f.status='pending' ORDER BY f.created_at DESC");
    let matches=[];
    losts.forEach(l=>{founds.forEach(f=>{
      let score=0;
      if(l.item_name&&f.item_name&&l.item_name.toLowerCase()===f.item_name.toLowerCase())score+=40;
      else if(l.item_name&&f.item_name&&(l.item_name.toLowerCase().includes(f.item_name.toLowerCase())||f.item_name.toLowerCase().includes(l.item_name.toLowerCase())))score+=25;
      if(l.category_id===f.category_id)score+=20;
      if(l.location&&f.location&&l.location.toLowerCase()===f.location.toLowerCase())score+=20;
      if(l.description&&f.description){const w1=l.description.toLowerCase().split(' '),w2=f.description.toLowerCase().split(' ');const common=w1.filter(w=>w2.includes(w)&&w.length>3);score+=Math.min(common.length*5,20)}
      if(score>=30)matches.push({lost:l,found:f,score})
    })});
    matches.sort((a,b)=>b.score-a.score);
    let mHtml='';matches.slice(0,20).forEach((m,i)=>{mHtml+=`<div class="card-3d mb-2 animate-in" style="${this.animDelay(i)};padding:16px"><div class="d-flex justify-between align-center"><div class="d-flex gap-3 align-center"><span class="badge-3d badge-lost">Lost: ${this.h(m.lost.item_name)}</span><i class="bi bi-link-45deg" style="font-size:1.2rem;color:var(--accent)"></i><span class="badge-3d badge-found">Found: ${this.h(m.found.item_name)}</span></div><div class="d-flex align-center gap-2"><div class="progress-bar" style="width:100px"><div class="fill" style="width:${m.score}%;background:${m.score>=70?'var(--success)':m.score>=50?'var(--warning)':'var(--danger)'}"></div></div><span class="text-sm fw-bold" style="color:${m.score>=70?'var(--success)':m.score>=50?'var(--warning)':'var(--danger)'}">${m.score}%</span></div></div>
      <div class="d-flex justify-between align-center mt-2"><div class="text-xs text-muted">Lost by ${this.h(m.lost.fullname)} | Found by ${this.h(m.found.fullname)} | ${m.found.location||''}</div><div class="d-flex gap-2"><a href="#item_detail?type=lost&id=${m.lost.lost_id}" class="btn-glass btn-sm">View Lost</a><a href="#item_detail?type=found&id=${m.found.found_id}" class="btn-glass btn-sm">View Found</a></div></div></div>`});
    document.getElementById('main-content').innerHTML=`
      <h2 class="page-title animate-in"><i class="bi bi-link-45deg gradient-text"></i> <span class="gradient-text">Item Matching</span></h2>
      <div class="alert alert-info animate-in"><i class="bi bi-info-circle"></i> Auto-matches lost and found items based on name, category, location, and description similarity.</div>
      <div class="row row-3 mb-4">
        <div class="stat-card animate-in"><div class="stat-icon" style="background:rgba(245,158,11,0.15);color:var(--warning)"><i class="bi bi-flag"></i></div><h2 style="color:var(--warning)">${losts.length}</h2><p>Pending Lost</p></div>
        <div class="stat-card animate-in" style="animation-delay:.1s"><div class="stat-icon" style="background:rgba(16,185,129,0.15);color:var(--success)"><i class="bi bi-hand-index-thumb"></i></div><h2 style="color:var(--success)">${founds.length}</h2><p>Pending Found</p></div>
        <div class="stat-card animate-in" style="animation-delay:.2s"><div class="stat-icon" style="background:rgba(139,92,246,0.15);color:var(--accent)"><i class="bi bi-link-45deg"></i></div><h2 style="color:var(--accent)">${matches.length}</h2><p>Possible Matches</p></div>
      </div>
      <h3 class="fw-bold mb-3 animate-in" style="animation-delay:.3s"><i class="bi bi-stars" style="color:var(--warning)"></i> Suggested Matches</h3>
      ${mHtml||'<div class="empty-state animate-in" style="animation-delay:.3s"><i class="bi bi-search"></i><h4>No matches found</h4><p>More items needed for matching</p></div>'}${this.footer()}`;
  },

  pgAdminAnalytics(){
    const totalL=DB.q1("SELECT COUNT(*) as c FROM lost_items").c;
    const totalF=DB.q1("SELECT COUNT(*) as c FROM found_items").c;
    const returned=DB.q1("SELECT COUNT(*) as c FROM found_items WHERE status='returned'").c;
    const totalU=DB.q1("SELECT COUNT(*) as c FROM users").c;
    const rate=totalL>0?Math.round((returned/totalL)*100):0;
    const byCat=DB.q("SELECT c.category_name, COUNT(l.lost_id) as lost_count, COUNT(f.found_id) as found_count FROM categories c LEFT JOIN lost_items l ON c.category_id=l.category_id LEFT JOIN found_items f ON c.category_id=f.category_id GROUP BY c.category_id ORDER BY lost_count DESC");
    const byFaculty=DB.q("SELECT u.faculty, COUNT(l.lost_id) as lost_count FROM lost_items l JOIN users u ON l.user_id=u.user_id WHERE u.faculty IS NOT NULL GROUP BY u.faculty ORDER BY lost_count DESC");
    const byLocation=DB.q("SELECT location, COUNT(*) as cnt FROM lost_items WHERE location IS NOT NULL GROUP BY location ORDER BY cnt DESC LIMIT 10");
    let catBars='';const maxCat=Math.max(...byCat.map(c=>c.lost_count+c.found_count),1);
    byCat.forEach(c=>{const total=c.lost_count+c.found_count;const pct=Math.round((total/maxCat)*100);catBars+=`<div class="mb-3"><div class="d-flex justify-between mb-1"><span class="text-sm fw-bold">${this.h(c.category_name)}</span><span class="text-xs text-muted">Lost: ${c.lost_count} | Found: ${c.found_count}</span></div><div class="progress-bar"><div class="fill" style="width:${pct}%;background:linear-gradient(90deg,var(--warning),var(--success))"></div></div></div>`});
    let facBars='';const maxFac=Math.max(...byFaculty.map(f=>f.lost_count),1);
    byFaculty.forEach(f=>{const pct=Math.round((f.lost_count/maxFac)*100);facBars+=`<div class="mb-3"><div class="d-flex justify-between mb-1"><span class="text-sm fw-bold">${this.h(f.faculty)}</span><span class="text-xs text-muted">${f.lost_count}</span></div><div class="progress-bar"><div class="fill" style="width:${pct}%;background:linear-gradient(90deg,var(--accent),var(--accent2))"></div></div></div>`});
    let locRows='';byLocation.forEach((l,i)=>{locRows+=`<tr><td>${i+1}</td><td>${this.h(l.location)}</td><td>${l.cnt}</td><td><div class="progress-bar" style="width:120px"><div class="fill" style="width:${Math.round((l.cnt/maxCat)*100)}%;background:var(--primary)"></div></div></td></tr>`});
    document.getElementById('main-content').innerHTML=`
      <h2 class="page-title animate-in"><i class="bi bi-graph-up gradient-text"></i> <span class="gradient-text">Analytics</span></h2>
      <div class="row row-4 mb-5">
        <div class="stat-card animate-in"><div class="stat-icon" style="background:rgba(245,158,11,0.15);color:var(--warning)"><i class="bi bi-flag"></i></div><h2 style="color:var(--warning)">${totalL}</h2><p>Total Lost</p></div>
        <div class="stat-card animate-in" style="animation-delay:.1s"><div class="stat-icon" style="background:rgba(16,185,129,0.15);color:var(--success)"><i class="bi bi-hand-index-thumb"></i></div><h2 style="color:var(--success)">${totalF}</h2><p>Total Found</p></div>
        <div class="stat-card animate-in" style="animation-delay:.2s"><div class="stat-icon" style="background:rgba(99,102,241,0.15);color:var(--primary-light)"><i class="bi bi-arrow-return-left"></i></div><h2 style="color:var(--primary-light)">${returned}</h2><p>Returned</p></div>
        <div class="stat-card animate-in" style="animation-delay:.3s"><div class="stat-icon" style="background:rgba(139,92,246,0.15);color:var(--accent)"><i class="bi bi-percent"></i></div><h2 style="color:var(--accent)">${rate}%</h2><p>Recovery Rate</p></div>
      </div>
      <div class="row row-2 mb-5">
        <div class="card-3d animate-in" style="animation-delay:.4s"><h3 class="fw-bold mb-4"><i class="bi bi-tags" style="color:var(--primary-light)"></i> By Category</h3>${catBars||'<p class="text-muted">No data</p>'}</div>
        <div class="card-3d animate-in" style="animation-delay:.5s"><h3 class="fw-bold mb-4"><i class="bi bi-building" style="color:var(--accent)"></i> By Faculty</h3>${facBars||'<p class="text-muted">No data</p>'}</div>
      </div>
      <div class="card-3d animate-in" style="animation-delay:.6s"><h3 class="fw-bold mb-4"><i class="bi bi-geo-alt" style="color:var(--accent2)"></i> Top Locations</h3><div style="overflow-x:auto"><table class="table-glass"><thead><tr><th>#</th><th>Location</th><th>Reports</th><th></th></tr></thead><tbody>${locRows||'<tr><td colspan="4" class="text-center text-muted">No data</td></tr>'}</tbody></table></div></div>${this.footer()}`;
  },

  pgAdminBackup(){
    const counts={users:DB.q1("SELECT COUNT(*) as c FROM users").c,lost_items:DB.q1("SELECT COUNT(*) as c FROM lost_items").c,found_items:DB.q1("SELECT COUNT(*) as c FROM found_items").c,claims:DB.q1("SELECT COUNT(*) as c FROM claims").c,notifications:DB.q1("SELECT COUNT(*) as c FROM notifications").c,announcements:DB.q1("SELECT COUNT(*) as c FROM announcements").c,audit_log:DB.q1("SELECT COUNT(*) as c FROM audit_log").c,feedback:DB.q1("SELECT COUNT(*) as c FROM feedback").c};
    let tableRows='';Object.entries(counts).forEach(([k,v])=>{tableRows+=`<tr><td class="fw-bold">${k.replace(/_/g,' ')}</td><td>${v}</td></tr>`});
    document.getElementById('main-content').innerHTML=`
      <h2 class="page-title animate-in"><i class="bi bi-download gradient-text"></i> <span class="gradient-text">Export Data</span></h2>
      <div class="row row-2">
        <div class="card-3d animate-in"><h3 class="fw-bold mb-4"><i class="bi bi-database" style="color:var(--primary-light)"></i> Database Summary</h3><div style="overflow-x:auto"><table class="table-glass"><thead><tr><th>Table</th><th>Records</th></tr></thead><tbody>${tableRows}</tbody></table></div></div>
        <div class="card-3d animate-in" style="animation-delay:.1s"><h3 class="fw-bold mb-4"><i class="bi bi-download" style="color:var(--accent)"></i> Export Options</h3>
          <div class="d-flex flex-col gap-3">
            <button class="btn-glass btn-primary btn-lg" onclick="App.exportCSV('users')"><i class="bi bi-filetype-csv"></i> Export Users (CSV)</button>
            <button class="btn-glass btn-success btn-lg" onclick="App.exportCSV('lost_items')"><i class="bi bi-filetype-csv"></i> Export Lost Items (CSV)</button>
            <button class="btn-glass btn-warning btn-lg" onclick="App.exportCSV('found_items')"><i class="bi bi-filetype-csv"></i> Export Found Items (CSV)</button>
            <button class="btn-glass btn-info btn-lg" onclick="App.exportCSV('claims')"><i class="bi bi-filetype-csv"></i> Export Claims (CSV)</button>
            <button class="btn-glass btn-lg" onclick="App.exportJSON()"><i class="bi bi-filetype-json"></i> Export All (JSON)</button>
            <button class="btn-glass btn-danger btn-lg" onclick="App.exportAudit()"><i class="bi bi-journal-text"></i> Export Audit Log (CSV)</button>
          </div>
        </div>
      </div>${this.footer()}`;
  },
  exportCSV(table){
    const data=DB.q(`SELECT * FROM ${table}`);if(!data.length){this.toast('No data to export.','warning');return}
    const headers=Object.keys(data[0]);let csv=headers.join(',')+'\n';data.forEach(r=>{csv+=headers.map(h=>`"${String(r[h]||'').replace(/"/g,'""')}"`).join(',')+'\n'});
    const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`findme_${table}_${new Date().toISOString().split('T')[0]}.csv`;a.click();this.toast(`${table} exported!`);DB.log(Auth.user.user_id,'export','data',null,`Exported ${table} as CSV`);
  },
  exportJSON(){
    const tables=['users','lost_items','found_items','claims','categories','notifications','announcements','audit_log','feedback'];
    const data={};tables.forEach(t=>{data[t]=DB.q(`SELECT * FROM ${t}`)});
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`findme_full_backup_${new Date().toISOString().split('T')[0]}.json`;a.click();this.toast('Full backup exported!');DB.log(Auth.user.user_id,'export','data',null,'Full JSON backup exported');
  },
  exportAudit(){this.exportCSV('audit_log')},

  pgAdminSettings(){
    const settings=DB.q("SELECT * FROM settings ORDER BY setting_key");
    let rows='';settings.forEach(s=>{rows+=`<tr><td class="fw-bold text-sm">${this.h(s.setting_key)}</td><td><input type="text" class="input-glass" value="${this.h(s.setting_value||'')}" data-key="${this.h(s.setting_key)}" style="padding:8px 12px;font-size:0.85rem" onchange="App.saveSetting(this)"></td></tr>`});
    document.getElementById('main-content').innerHTML=`
      <h2 class="page-title animate-in"><i class="bi bi-sliders gradient-text"></i> <span class="gradient-text">System Settings</span></h2>
      <div class="card-3d animate-in" style="max-width:700px"><h3 class="fw-bold mb-4"><i class="bi bi-gear" style="color:var(--primary-light)"></i> Configuration</h3>
        <div style="overflow-x:auto"><table class="table-glass"><thead><tr><th>Setting</th><th>Value</th></tr></thead><tbody>${rows}</tbody></table></div>
        <div class="divider"></div><div class="d-flex gap-3">
          <button class="btn-glass btn-danger" onclick="if(confirm('Reset ALL data? This cannot be undone!')){localStorage.clear();location.reload()}"><i class="bi bi-trash"></i> Reset All Data</button>
          <button class="btn-glass btn-warning" onclick="if(confirm('Clear audit log?')){DB.run('DELETE FROM audit_log');App.toast('Audit log cleared.');App.pgAdminSettings()}"><i class="bi bi-journal-x"></i> Clear Audit Log</button>
        </div>
      </div>${this.footer()}`;
  },
  saveSetting(el){DB.setSetting(el.dataset.key,el.value);this.toast('Setting saved!')},

  pgAdminMassMsg(){
    document.getElementById('main-content').innerHTML=`
      <h2 class="page-title animate-in"><i class="bi bi-envelope gradient-text"></i> <span class="gradient-text">Mass Message</span></h2>
      <div class="card-3d animate-in" style="max-width:700px"><h3 class="fw-bold mb-4"><i class="bi bi-send" style="color:var(--accent)"></i> Send to All Users</h3>
        <form id="massMsgForm">
          <div class="form-group"><label>Target Role *</label><select class="input-glass" id="mmRole"><option value="all">All Users</option><option value="student">Students Only</option><option value="staff">Staff Only</option><option value="security">Security Only</option><option value="moderator">Moderators Only</option></select></div>
          <div class="form-group"><label>Subject *</label><input type="text" class="input-glass" id="mmSubject" required placeholder="Message subject"></div>
          <div class="form-group"><label>Message *</label><textarea class="input-glass" id="mmBody" rows="6" required placeholder="Write your message..."></textarea></div>
          <div class="d-flex justify-between align-center">
            <span class="text-sm text-muted" id="mmCount">Will be sent to 0 users</span>
            <button type="submit" class="btn-glass btn-primary btn-lg"><i class="bi bi-send"></i> Send Message</button>
          </div>
        </form>
      </div>${this.footer()}`;
    const updateCount=()=>{const role=document.getElementById('mmRole').value;const q=role==='all'?"SELECT COUNT(*) as c FROM users WHERE user_id!=?" : "SELECT COUNT(*) as c FROM users WHERE role=? AND user_id!=?";const params=role==='all'?[Auth.user.user_id]:[role,Auth.user.user_id];const c=DB.q1(q,params);document.getElementById('mmCount').textContent=`Will be sent to ${c?c.c:0} users`};
    document.getElementById('mmRole').onchange=updateCount;updateCount();
    document.getElementById('massMsgForm').onsubmit=e=>{e.preventDefault();const role=document.getElementById('mmRole').value;const subj=document.getElementById('mmSubject').value.trim();const body=document.getElementById('mmBody').value.trim();const q=role==='all'?"SELECT user_id FROM users WHERE user_id!=?":"SELECT user_id FROM users WHERE role=? AND user_id!=?";const params=role==='all'?[Auth.user.user_id]:[role,Auth.user.user_id];const users=DB.q(q,params);users.forEach(u=>DB.notify(u.user_id,`[Announcement] ${subj}: ${body}`,'announcement'));DB.log(Auth.user.user_id,'mass_message','user',users.length,`Sent to ${role}: ${subj}`);      this.toast(`Message sent to ${users.length} users!`);this.go('admin_dashboard')};
  },

  pgChat(){
    const uid=Auth.user.user_id;
    const users=DB.q("SELECT user_id,fullname,email,role,student_id FROM users WHERE user_id!=? AND status='active' ORDER BY fullname",[uid]);
    const convos=DB.q(`SELECT m.*, u.fullname as other_name, u.user_id as other_id, u.role as other_role FROM messages m JOIN users u ON (CASE WHEN m.sender_id=? THEN m.receiver_id ELSE m.sender_id END)=u.user_id WHERE m.sender_id=? OR m.receiver_id=? GROUP BY other_id ORDER BY m.created_at DESC`,[uid,uid,uid]);
    const convoMap={};convos.forEach(c=>{convoMap[c.other_id]=c});
    let userList='';users.forEach((u,i)=>{
      const lastMsg=convoMap[u.user_id];
      const unread=lastMsg&&lastMsg.sender_id!==u.user_id?DB.q1("SELECT COUNT(*) as c FROM messages WHERE sender_id=? AND receiver_id=? AND is_read=0",[u.user_id,uid]).c:0;
      const roleBadge=Auth.roleBadge(u.role);
      userList+=`<a href="#chat_detail?id=${u.user_id}" style="text-decoration:none;color:var(--text)"><div class="card-3d mb-2 animate-in" style="${this.animDelay(i)};padding:14px;cursor:pointer"><div class="d-flex gap-3 align-center"><div class="nav-avatar" style="width:44px;height:44px;flex-shrink:0">${(u.fullname||'U').charAt(0)}</div><div class="flex-1" style="min-width:0"><div class="d-flex justify-between align-center"><span class="fw-bold text-sm">${this.h(u.fullname)}</span>${roleBadge}</div><p class="text-xs text-muted" style="display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;margin-top:2px">${lastMsg?this.h(lastMsg.message):'Start a conversation'}</p></div><div style="text-align:right;flex-shrink:0">${unread>0?`<span class="notif-badge">${unread}</span>`:''}${lastMsg?`<div class="text-xs text-muted">${lastMsg.created_at||''}</div>`:''}</div></div></div></a>`;
    });
    document.getElementById('main-content').innerHTML=`
      <h2 class="page-title animate-in"><i class="bi bi-chat-dots gradient-text"></i> <span class="gradient-text">Chat</span></h2>
      <div class="card-3d animate-in" style="animation-delay:.1s;max-width:700px">
        <div class="form-group" style="margin-bottom:16px"><input type="text" class="input-glass" id="chatSearch" placeholder="Search users..." oninput="App.filterChatUsers()"></div>
        <div id="chatUserList">${userList||'<div class="empty-state"><i class="bi bi-people"></i><p>No users found</p></div>'}</div>
      </div>${this.footer()}`;
  },
  filterChatUsers(){
    const q=(document.getElementById('chatSearch')?.value||'').toLowerCase();
    document.querySelectorAll('#chatUserList .card-3d').forEach(el=>{
      el.style.display=el.textContent.toLowerCase().includes(q)?'':'none';
    });
  },

  pgChatDetail(){
    const rid=parseInt(new URLSearchParams(location.hash.split('?')[1]).get('id'));
    if(!rid){this.go('chat');return}
    const uid=Auth.user.user_id;
    const other=DB.q1("SELECT user_id,fullname,role,student_id,faculty FROM users WHERE user_id=?",[rid]);
    if(!other){this.toast('User not found.','danger');this.go('chat');return}
    const msgs=DB.q("SELECT m.*, u.fullname FROM messages m JOIN users u ON m.sender_id=u.user_id WHERE (m.sender_id=? AND m.receiver_id=?) OR (m.sender_id=? AND m.receiver_id=?) ORDER BY m.created_at ASC",[uid,rid,rid,uid]);
    DB.run("UPDATE messages SET is_read=1 WHERE sender_id=? AND receiver_id=? AND is_read=0",[rid,uid]);
    let bubbles='';msgs.forEach(m=>{const isSent=m.sender_id===uid;bubbles+=`<div class="chat-bubble ${isSent?'chat-sent':'chat-received'} animate-in">${this.h(m.message)}<div class="text-xs ${isSent?'':'text-muted'}" style="margin-top:4px;opacity:0.7">${m.created_at}</div></div>`});
    document.getElementById('main-content').innerHTML=`
      <div class="d-flex align-center mb-4"><button class="btn-glass" onclick="App.go('chat')"><i class="bi bi-arrow-left"></i></button><div class="d-flex align-center gap-3" style="margin-left:12px"><div class="nav-avatar" style="width:40px;height:40px;flex-shrink:0">${(other.fullname||'U').charAt(0)}</div><div><h2 class="page-title animate-in" style="margin:0;font-size:1.2rem">${this.h(other.fullname)}</h2><p class="text-xs text-muted">${Auth.roleBadge(other.role)} ${other.faculty?'&middot; '+this.h(other.faculty):''}</p></div></div></div>
      <div class="card-3d animate-in" style="max-width:800px"><div id="chatMsgList" style="min-height:300px;max-height:500px;overflow-y:auto;padding:16px">${bubbles||'<div class="empty-state"><i class="bi bi-chat-dots"></i><p>Start the conversation</p></div>'}</div>
      <div class="divider"></div><form id="chatForm" class="d-flex gap-2"><input type="text" class="input-glass flex-1" id="chatInput" placeholder="Type a message..." required><button type="submit" class="btn-glass btn-primary"><i class="bi bi-send"></i></button></form></div>${this.footer()}`;
    const list=document.getElementById('chatMsgList');list.scrollTop=list.scrollHeight;
    document.getElementById('chatForm').onsubmit=e=>{e.preventDefault();const txt=document.getElementById('chatInput').value.trim();if(!txt)return;DB.sendMsg(uid,rid,txt);document.getElementById('chatInput').value='';DB.notify(rid,`New message from ${Auth.user.fullname}`,'message','#chat_detail?id='+uid);this.pgChatDetail()};
  }
};

async function boot(){
  try{
    await DB.init();
    App.init();
  }catch(e){
    console.error('Boot error:',e);
    document.getElementById('main-content').innerHTML=`<div style="text-align:center;padding:80px 20px">
      <h1 style="color:#ef4444;margin-bottom:16px"><i class="bi bi-exclamation-triangle"></i> System Error</h1>
      <p style="color:#94a3b8;margin-bottom:8px">${e.message||'Unknown error'}</p>
      <p style="color:#64748b;margin-bottom:24px;font-size:0.85rem">Make sure you access this page via <code>http://localhost/lost-and-found/frontend/index.html</code></p>
      <button class="btn-glass btn-primary" onclick="localStorage.clear();sessionStorage.clear();location.reload()"><i class="bi bi-arrow-clockwise"></i> Reset Data & Reload</button>
    </div>`;
  }
}
boot();
</script>
</body>
</html>
